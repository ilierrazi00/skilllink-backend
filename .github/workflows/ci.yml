name: SkillLink CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  tests:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2

        with:
          php-version: '8.2'
          extensions: mongodb-1.21.0

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPUnit
        run: php bin/phpunit

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse src || true